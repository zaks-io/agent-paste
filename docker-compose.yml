services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-paste-postgres
    environment:
      POSTGRES_DB: agent_paste
      POSTGRES_USER: agent_paste
      POSTGRES_PASSWORD: agent_paste
    ports:
      - "5432:5432"
    volumes:
      - agent-paste-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_paste -d agent_paste"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  agent-paste-postgres:
