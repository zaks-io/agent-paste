name: Setup security attestation tools
description: Install the scanner CLIs used by pnpm security:attest.
runs:
  using: composite
  steps:
    - name: Install binary scanner CLIs
      shell: bash
      env:
        GITLEAKS_VERSION: 8.30.1
        TRIVY_VERSION: 0.69.3
        SYFT_VERSION: 1.42.4
        GRYPE_VERSION: 0.111.0
      run: |
        set -euo pipefail
        curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
          | tar -xz -C /usr/local/bin gitleaks
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sh -s -- -b /usr/local/bin "v${TRIVY_VERSION}"
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
          | sh -s -- -b /usr/local/bin "v${SYFT_VERSION}"
        curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
          | sh -s -- -b /usr/local/bin "v${GRYPE_VERSION}"

    - name: Install Python scanner CLIs
      shell: bash
      run: |
        set -euo pipefail
        python3 -m pip install --user "checkov==3.2.510" "semgrep==1.157.0"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Show scanner versions
      shell: bash
      run: |
        set -euo pipefail
        gitleaks version
        trivy --version
        syft version
        grype version
        checkov --version
        semgrep --version
