# Daily and main-branch security attestation. This workflow deliberately does
# not run on pull_request; PR CI stays fast, and release/deploy workflows run the
# same `pnpm security:attest` command on the exact commit being published.

name: Security

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-attestation:
    name: Repo security attestation
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Setup security attestation tools
        uses: ./.github/actions/setup-security-attestation-tools

      - name: Run repo security attestation
        run: pnpm security:attest

      - name: Upload repo security attestation
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repo-security-attestation
          path: artifacts/security/**
          if-no-files-found: error
          retention-days: 90

  snyk-sca:
    name: Dependency scan (Snyk SCA)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Snyk Open Source test
        run: pnpm dlx snyk@latest test --all-projects --severity-threshold=high

      - name: Snyk monitor main
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: pnpm dlx snyk@latest monitor --all-projects
