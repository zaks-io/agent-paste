name: PR Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".claude/**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CI: "true"
  TURBO_TELEMETRY_DISABLED: "1"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    name: Deploy PR Preview
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 25
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    environment:
      name: Preview
      url: ${{ steps.deploy.outputs.apex_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Reconcile stale PR preview resources
        continue-on-error: true
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: node scripts/cleanup-stale-pr-previews.mjs --exclude-pr "$PR_NUMBER"

      - name: Check PR preview resource capacity
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/check-pr-preview-capacity.mjs

      - name: Create Neon PR branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.pull_request.number }}
          parent_branch: main
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Verify Neon branch isolation
        env:
          NEON_BRANCH_ID: ${{ steps.neon.outputs.branch_id }}
          NEON_PRODUCTION_BRANCH_ID: ${{ vars.NEON_PRODUCTION_BRANCH_ID }}
        run: |
          test -n "$NEON_BRANCH_ID"
          if [ -n "$NEON_PRODUCTION_BRANCH_ID" ] && [ "$NEON_BRANCH_ID" = "$NEON_PRODUCTION_BRANCH_ID" ]; then
            echo "::error::PR Neon branch id matches production branch id"
            exit 1
          fi

      - name: Prepare PR app_role password
        id: pr_app_role
        run: |
          PASSWORD="$(openssl rand -base64 24)"
          echo "::add-mask::$PASSWORD"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Migrate PR database
        env:
          # Bootstrap migrations with the Neon owner URL until platform_admin exists on the project.
          DATABASE_URL_MIGRATIONS_PREVIEW: ${{ steps.neon.outputs.db_url }}
          DATABASE_RUNTIME_ROLE_PASSWORD: ${{ steps.pr_app_role.outputs.password }}
        run: node scripts/migrate.mjs preview

      - name: Resolve PR runtime database URL
        id: neon_runtime
        env:
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_BRANCH_ID: ${{ steps.neon.outputs.branch_id }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_BOOTSTRAP_DATABASE_URL: ${{ steps.neon.outputs.db_url }}
          NEON_ROLE_NAME: app_role
          DATABASE_RUNTIME_ROLE_PASSWORD: ${{ steps.pr_app_role.outputs.password }}
        run: node scripts/resolve-neon-role-url.mjs --github-output db_url

      - name: Create or reuse PR Hyperdrive
        id: hyperdrive
        env:
          PR_DATABASE_URL: ${{ steps.neon_runtime.outputs.db_url }}
        run: node scripts/create-hyperdrive.mjs --name agent-paste-db-pr-${{ github.event.pull_request.number }} --connection-string-env PR_DATABASE_URL --github-output hyperdrive_id

      - name: Build PR artifacts
        run: pnpm build

      - name: Verify PR preview secret seed
        env:
          PR_PREVIEW_SECRET_SEED: ${{ secrets.PR_PREVIEW_SECRET_SEED }}
        run: |
          if [ -z "$PR_PREVIEW_SECRET_SEED" ]; then
            echo "::error::PR_PREVIEW_SECRET_SEED is required for deterministic PR preview secrets"
            exit 1
          fi

      - name: Deploy PR Workers
        id: deploy
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HYPERDRIVE_ID: ${{ steps.hyperdrive.outputs.hyperdrive_id }}
          CLOUDFLARE_WORKERS_SUBDOMAIN: ${{ vars.CLOUDFLARE_WORKERS_SUBDOMAIN }}
          PR_PREVIEW_SECRET_SEED: ${{ secrets.PR_PREVIEW_SECRET_SEED }}
          OPERATOR_EMAILS: isaac@zaks.io
          # Preview WorkOS environment API key; when unset, deploy-pr-preview.mjs
          # skips the web worker (the other workers need no WorkOS credential).
          WORKOS_PREVIEW_API_KEY: ${{ secrets.WORKOS_PREVIEW_API_KEY }}
          # Enables client source-map upload during the web build; no-ops if unset.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: node scripts/deploy-pr-preview.mjs

      - name: Wait for Workers /healthz readiness
        env:
          API_URL: ${{ steps.deploy.outputs.api_url }}
          UPLOAD_URL: ${{ steps.deploy.outputs.upload_url }}
          CONTENT_URL: ${{ steps.deploy.outputs.content_url }}
          JOBS_URL: ${{ steps.deploy.outputs.jobs_url }}
          APEX_URL: ${{ steps.deploy.outputs.apex_url }}
          WEB_SMOKE_URL: ${{ steps.deploy.outputs.web_smoke_url }}
        run: |
          # Require CONSECUTIVE_REQUIRED consecutive 200s before declaring a URL ready.
          # Only an exact 200 counts as healthy. HTTP 404 (route not yet propagated)
          # and HTTP 530 (Cloudflare error 1042, worker not yet routed) are
          # expected-transient during propagation, so they just reset the counter
          # and we retry. Connection/timeout errors capture as "000".
          CURL_TIMEOUT=5
          CONSECUTIVE_REQUIRED=3
          MAX_ATTEMPTS=45
          SLEEP_SECONDS=2

          wait_for_healthz() {
            local url="$1/healthz"
            local i=0
            local consecutive=0
            while [ $i -lt $MAX_ATTEMPTS ]; do
              i=$((i+1))
              status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time $CURL_TIMEOUT "$url" 2>/dev/null) || status="000"
              if [ "$status" = "200" ]; then
                consecutive=$((consecutive+1))
                echo "$url healthy ($consecutive/$CONSECUTIVE_REQUIRED) on attempt $i"
                if [ $consecutive -ge $CONSECUTIVE_REQUIRED ]; then
                  echo "$url ready after $i attempt(s)"
                  return 0
                fi
              else
                # 404 = route not yet propagated; 530 = CF error 1042 (worker not routed yet)
                consecutive=0
                echo "$url not ready (status=$status) on attempt $i, retrying..."
              fi
              sleep $SLEEP_SECONDS
            done
            echo "::error::$url never got $CONSECUTIVE_REQUIRED consecutive healthy /healthz responses within ~$((MAX_ATTEMPTS * (CURL_TIMEOUT + SLEEP_SECONDS)))s"
            return 1
          }
          wait_for_healthz "$API_URL"
          wait_for_healthz "$UPLOAD_URL"
          wait_for_healthz "$CONTENT_URL"
          wait_for_healthz "$JOBS_URL"
          wait_for_healthz "$APEX_URL"
          if [ -n "$WEB_SMOKE_URL" ]; then wait_for_healthz "$WEB_SMOKE_URL"; fi

      - name: Lighthouse dashboard accessibility gate
        env:
          # Override in workflow_dispatch or forked test runs if the style-guide threshold changes.
          AGENT_PASTE_LIGHTHOUSE_A11Y_MIN_SCORE: "95"
        run: pnpm lighthouse:dashboard-a11y

      - name: Comment PR preview links
        uses: actions/github-script@v8
        with:
          script: |
            // The gate waits on the workers.dev smoke host, not this custom domain,
            // so on a first deploy its TLS cert may still be propagating (minutes).
            const webLine = process.env.WEB_URL
              ? [`Web (login): ${process.env.WEB_URL} (first deploy: allow a few minutes for the TLS cert)`]
              : [];
            const body = [
              "agent-paste PR preview is ready.",
              "",
              `API: ${process.env.API_URL}`,
              `Upload: ${process.env.UPLOAD_URL}`,
              `Content: ${process.env.CONTENT_URL}`,
              `Jobs: ${process.env.JOBS_URL}`,
              `Apex: ${process.env.APEX_URL}`,
              ...webLine,
              `Neon branch: https://console.neon.tech/app/projects/${process.env.NEON_PROJECT_ID}/branches/${process.env.NEON_BRANCH_ID}`,
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
        env:
          API_URL: ${{ steps.deploy.outputs.api_url }}
          UPLOAD_URL: ${{ steps.deploy.outputs.upload_url }}
          CONTENT_URL: ${{ steps.deploy.outputs.content_url }}
          JOBS_URL: ${{ steps.deploy.outputs.jobs_url }}
          APEX_URL: ${{ steps.deploy.outputs.apex_url }}
          WEB_URL: ${{ steps.deploy.outputs.web_url }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_BRANCH_ID: ${{ steps.neon.outputs.branch_id }}

  forked-pr:
    name: Skip Forked PR
    runs-on: blacksmith-2vcpu-ubuntu-2404
    if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
    steps:
      - name: Explain skip
        run: echo "Skipping PR preview deploy for forked PR because secret-bearing Cloudflare and Neon steps are not safe."
