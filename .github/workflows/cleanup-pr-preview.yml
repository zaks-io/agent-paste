name: Cleanup PR Preview

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to clean up
        required: true

permissions:
  contents: read
  pull-requests: write
  administration: write

concurrency:
  group: pr-preview-cleanup-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

env:
  CI: "true"
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  cleanup:
    name: Cleanup PR Preview
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Resolve PR number
        id: pr
        run: echo "number=${{ github.event.pull_request.number || inputs.pr_number }}" >> "$GITHUB_OUTPUT"

      - name: Delete Cloudflare PR resources
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: node scripts/cleanup-pr-preview.mjs

      - name: Delete Neon PR branch
        uses: neondatabase/delete-branch-action@v3
        continue-on-error: true
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ steps.pr.outputs.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Delete GitHub Preview environment
        uses: actions/github-script@v8
        with:
          script: |
            const name = `pr-preview-${process.env.PR_NUMBER}`;
            try {
              await github.rest.repos.deleteAnEnvironment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment_name: name,
              });
              core.info(`Deleted environment ${name}`);
            } catch (err) {
              if (err.status === 404) {
                core.info(`Environment ${name} not found; nothing to delete`);
                return;
              }
              throw err;
            }
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}

      - name: Comment cleanup status
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "agent-paste PR preview resources were cleaned up.",
            });
