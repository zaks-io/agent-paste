name: CLI Release

# Manually cross/native-compiles the @zaks-io/agent-paste CLI into standalone
# single-file binaries (one per platform, no Node/node_modules required) with
# `bun build --compile`, signs+notarizes the macOS binary with Apple's standard
# tooling (codesign + notarytool), and attaches everything to a single DRAFT
# GitHub Release for human review before publishing.
#
# Native per-OS Blacksmith runners so each binary is built and smoke-checked on
# its real target OS. See AP-36 / AP-41.

on:
  # No tag input: the release tag is derived from apps/cli/package.json's version
  # (cli-v<version>), the single source of truth shared by the baked binary, the
  # npm publish, and the CLI_RELEASE KV value. Bump package.json in a normal PR;
  # dispatching this workflow then cuts the matching draft with no tag to type.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cli-release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    # Job-level permissions REPLACE (not merge with) the top-level contents:read,
    # so re-declare it alongside the attestation scopes. id-token mints the
    # Sigstore OIDC token; attestations persists the provenance.
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: blacksmith-2vcpu-ubuntu-2404
            target: bun-linux-x64
            asset: agent-paste-linux-x64
          - name: linux-arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
            target: bun-linux-arm64
            asset: agent-paste-linux-arm64
          - name: macos-arm64
            runner: blacksmith-6vcpu-macos-latest
            target: bun-darwin-arm64
            asset: agent-paste-darwin-arm64
          - name: windows-x64
            runner: blacksmith-4vcpu-windows-2025
            target: bun-windows-x64
            asset: agent-paste-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      # --conditions=types resolves @agent-paste/* workspace deps to their TS
      # source (mirrors apps/cli/build.mjs), so no pre-compile of workspace pkgs.
      - name: Compile binary
        working-directory: apps/cli
        shell: bash
        env:
          BUN_TARGET: ${{ matrix.target }}
          ASSET: ${{ matrix.asset }}
        run: |
          set -euo pipefail
          # Bake package.json's version into the binary (ADR 0080). package.json
          # is the single source of truth: the binary, the npm publish, the
          # CLI_RELEASE KV value, and the release tag all derive from it, so the
          # channels cannot advertise mismatched versions.
          VERSION="$(node -p "require('./package.json').version")"
          # --metafile records the exact module graph bundled into the binary;
          # the SBOM step (linux-x64 leg) turns it into a CycloneDX BOM of what
          # actually ships. Platform-independent, so one leg's metafile suffices.
          bun build src/index.ts \
            --compile \
            --conditions=types \
            --define __AGENT_PASTE_CLI_VERSION__="\"$VERSION\"" \
            --target="$BUN_TARGET" \
            --outfile "$ASSET" \
            --metafile=meta.json
          # bun --compile does not set the exec bit, and upload-artifact does not
          # preserve it through its zip round-trip, so assert it here. Harmless on
          # the Windows .exe (filename carries the executable semantics there).
          chmod +x "$ASSET"

      # Generate the SBOM from the bundler metafile so it lists exactly the deps
      # compiled into the binary (workspace pkgs bundled from TS source + the
      # external closure: zod, @asteasolutions/zod-to-openapi) — not the whole
      # monorepo and not hollow. The closure is platform-independent, so generate
      # it once on the linux-x64 leg. CycloneDX is grype-scannable.
      - name: Generate SBOM from bundle (CycloneDX)
        if: matrix.name == 'linux-x64'
        working-directory: apps/cli
        shell: bash
        run: |
          set -euo pipefail
          npx --yes @cyclonedx/cyclonedx-esbuild@1 \
            --bwd "$PWD" \
            --output-reproducible \
            -o agent-paste-cli.sbom.cdx.json \
            meta.json

      - name: Upload SBOM artifact
        if: matrix.name == 'linux-x64'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: apps/cli/agent-paste-cli.sbom.cdx.json
          if-no-files-found: error
          retention-days: 7

      # Proves the binary is genuinely standalone: copy it OUTSIDE the repo to
      # $RUNNER_TEMP (no node_modules ancestry) and run it there. Running from
      # apps/cli would let any stray runtime dep resolve from node_modules and
      # mask a missing bundle. `whoami` exercises credentials.ts (keychain ->
      # file fallback); with no creds it reports "not signed in" and exits 0 (a
      # status query, not an authed action — no API key required).
      - name: Smoke-check binary
        if: runner.os != 'Windows'
        shell: bash
        env:
          ASSET: ${{ matrix.asset }}
        run: |
          set -euo pipefail
          cp "apps/cli/$ASSET" "$RUNNER_TEMP/$ASSET"
          chmod +x "$RUNNER_TEMP/$ASSET"
          cd "$RUNNER_TEMP"
          "./$ASSET" --help
          VERSION="$(node -p "require(process.env.GITHUB_WORKSPACE + '/apps/cli/package.json').version")"
          test "$("./$ASSET" version)" = "$VERSION"
          "./$ASSET" whoami

      - name: Smoke-check binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ASSET: ${{ matrix.asset }}
        run: |
          Copy-Item "apps/cli/$env:ASSET" "$env:RUNNER_TEMP/$env:ASSET"
          Set-Location "$env:RUNNER_TEMP"
          & ".\$env:ASSET" --help
          $version = node -p "require(process.env.GITHUB_WORKSPACE + '/apps/cli/package.json').version"
          $actual = (& ".\$env:ASSET" version).Trim()
          if ($actual -ne $version.Trim()) {
            throw "expected $env:ASSET version to print $version, got $actual"
          }
          & ".\$env:ASSET" whoami

      - name: Import Apple Developer certificate
        if: matrix.name == 'macos-arm64'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          : "${APPLE_CERTIFICATE:?APPLE_CERTIFICATE is required}"
          : "${APPLE_CERTIFICATE_PASSWORD:?APPLE_CERTIFICATE_PASSWORD is required}"
          : "${KEYCHAIN_PASSWORD:?KEYCHAIN_PASSWORD is required}"
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm certificate.p12

      - name: Write Apple notarization key
        if: matrix.name == 'macos-arm64'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          : "${APPLE_API_KEY_BASE64:?APPLE_API_KEY_BASE64 is required}"
          key_path="$RUNNER_TEMP/apple-api-key.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      # Hardened-runtime sign, then notarize the standalone executable. A bare
      # CLI binary cannot be stapled (no bundle/installer); notarytool acceptance
      # is the proof, and Gatekeeper verifies online at first run. We zip for
      # submission because notarytool requires a zip/pkg/dmg container.
      - name: Codesign + notarize binary
        if: matrix.name == 'macos-arm64'
        working-directory: apps/cli
        env:
          ASSET: ${{ matrix.asset }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          : "${APPLE_SIGNING_IDENTITY:?APPLE_SIGNING_IDENTITY is required}"
          : "${APPLE_API_ISSUER:?APPLE_API_ISSUER is required}"
          : "${APPLE_API_KEY:?APPLE_API_KEY is required}"
          : "${APPLE_API_KEY_PATH:?APPLE_API_KEY_PATH not set by prior step}"

          codesign --force --timestamp --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" "$ASSET"
          codesign --verify --strict --verbose=2 "$ASSET"

          ditto -c -k --keepParent "$ASSET" "$ASSET.zip"
          xcrun notarytool submit "$ASSET.zip" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          rm -f "$ASSET.zip"

      # Bind each shipped binary to this commit SHA + workflow run + builder
      # identity (SLSA build provenance). Placed AFTER codesign/notarize so the
      # attested digest matches the final macOS bytes; on the other three legs
      # nothing mutates the binary between compile and here (smoke-check runs on
      # a $RUNNER_TEMP copy), so the digest is equally final. Runs on all legs.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: apps/cli/${{ matrix.asset }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: apps/cli/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Draft release
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: write
      attestations: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Setup security attestation tools
        uses: ./.github/actions/setup-security-attestation-tools

      - name: Run repo security attestation
        run: pnpm security:attest

      - name: Upload repo security attestation
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-release-repo-security-attestation
          path: artifacts/security/**
          if-no-files-found: error
          retention-days: 90

      - name: Download all binaries
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: dist-binaries
          merge-multiple: true

      - name: Attach repo security attestation bundle
        run: tar -czf dist-binaries/repo-security-attestation.tgz -C artifacts/security .

      # GitHub artifact attestations live in GitHub's attestation store, but
      # OpenSSF Scorecard's Signed-Releases check only scans release asset
      # filenames. Export the SLSA provenance bundles as *.intoto.jsonl sidecars
      # so downstream users can verify offline and Scorecard can detect them.
      - name: Export provenance sidecars
        working-directory: dist-binaries
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          binary_assets=(
            "agent-paste-linux-x64"
            "agent-paste-linux-arm64"
            "agent-paste-darwin-arm64"
            "agent-paste-windows-x64.exe"
          )
          for asset in "${binary_assets[@]}"; do
            rm -f sha256:*.jsonl sha256-*.jsonl
            gh attestation download "$asset" \
              --repo "$REPO" \
              --predicate-type https://slsa.dev/provenance/v1 \
              --limit 1
            downloaded="$(find . -maxdepth 1 -type f \( -name 'sha256:*.jsonl' -o -name 'sha256-*.jsonl' \) -print)"
            downloaded_count="$(printf '%s\n' "$downloaded" | sed '/^$/d' | wc -l | tr -d ' ')"
            if [ "$downloaded_count" != "1" ]; then
              echo "::error::Expected one provenance bundle for $asset, found $downloaded_count"
              exit 1
            fi
            sidecar="$asset.intoto.jsonl"
            mv "$(printf '%s\n' "$downloaded" | sed -n '1p')" "$sidecar"

            expected_digest="$(sha256sum "$asset" | awk '{print $1}')"
            attested_digest="$(
              jq -r --arg name "$asset" \
                '.dsseEnvelope.payload | @base64d | fromjson | .subject[] | select(.name == $name) | .digest.sha256 // empty' \
                "$sidecar" | head -n 1
            )"
            if [ "$attested_digest" != "$expected_digest" ]; then
              echo "::error::Provenance digest mismatch for $asset: expected $expected_digest, got $attested_digest"
              exit 1
            fi
          done

      # Checksums cover only the binaries — the per-OS globs deliberately exclude
      # the agent-paste-cli.* SBOM/report files, which carry their own provenance.
      - name: Generate checksums
        working-directory: dist-binaries
        run: sha256sum agent-paste-linux-* agent-paste-darwin-* agent-paste-windows-* > SHA256SUMS

      # The SBOM was generated from the bundler metafile in the build job and
      # downloaded above (merge-multiple lands it in dist-binaries/). It lists
      # exactly what is compiled into the binary.
      - name: Scan CLI SBOM (blocking)
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: dist-binaries/agent-paste-cli.sbom.cdx.json
          severity-cutoff: medium
          fail-build: true
          output-format: json

      # Persist the grype report + a small metadata summary so build-time and the
      # Phase-3 daily re-scan are comparable (scanner + vuln-DB versions). The DB
      # metadata lives under descriptor.db.status in grype's JSON.
      - name: Capture scan report and scanner/DB versions
        shell: bash
        env:
          GRYPE_JSON: ${{ steps.grype.outputs.json }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cp "$GRYPE_JSON" dist-binaries/agent-paste-cli.grype.json
          jq -n \
            --arg grypeVersion "$(jq -r '.descriptor.version // empty' "$GRYPE_JSON")" \
            --arg vulnDbBuilt "$(jq -r '.descriptor.db.status.built // empty' "$GRYPE_JSON")" \
            --arg vulnDbSchemaVersion "$(jq -r '.descriptor.db.status.schemaVersion // empty' "$GRYPE_JSON")" \
            --arg commit "$COMMIT_SHA" \
            --arg scannedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{grypeVersion:$grypeVersion, vulnDbBuilt:$vulnDbBuilt, vulnDbSchemaVersion:$vulnDbSchemaVersion, commit:$commit, scannedAt:$scannedAt, blocking:true}' \
            > dist-binaries/scan-metadata.json
          cat dist-binaries/scan-metadata.json

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Derive the tag from package.json — the same source the binary baked
          # its version from — so the draft, the binary, and the eventual npm/KV
          # publish cannot disagree. Reject build-metadata (`+...`): valid npm but
          # illegal in a git tag ref, which `gh release create` would only fail on
          # opaquely later.
          VERSION="$(node -p "require('./apps/cli/package.json').version")"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Invalid package.json version for a release tag: $VERSION"
            exit 1
          fi
          TAG="cli-v$VERSION"
          release_assets=(
            "dist-binaries/agent-paste-linux-x64"
            "dist-binaries/agent-paste-linux-arm64"
            "dist-binaries/agent-paste-darwin-arm64"
            "dist-binaries/agent-paste-windows-x64.exe"
            "dist-binaries/agent-paste-linux-x64.intoto.jsonl"
            "dist-binaries/agent-paste-linux-arm64.intoto.jsonl"
            "dist-binaries/agent-paste-darwin-arm64.intoto.jsonl"
            "dist-binaries/agent-paste-windows-x64.exe.intoto.jsonl"
            "dist-binaries/agent-paste-cli.sbom.cdx.json"
            "dist-binaries/agent-paste-cli.grype.json"
            "dist-binaries/scan-metadata.json"
            "dist-binaries/repo-security-attestation.tgz"
            "dist-binaries/SHA256SUMS"
          )
          for asset in "${release_assets[@]}"; do
            if [ ! -s "$asset" ]; then
              echo "::error::Expected release asset is missing or empty: $asset"
              exit 1
            fi
          done
          # Drafts stay mutable for test reruns. Published releases are immutable
          # by repo setting, and this job refuses to upload to non-drafts.
          if gh release view "$TAG" >/dev/null 2>&1; then
            IS_DRAFT="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
            if [ "$IS_DRAFT" != "true" ]; then
              echo "::error::Release $TAG already exists and is not a draft; refusing to mutate published assets."
              exit 1
            fi
            gh release edit "$TAG" --draft --target "$GITHUB_SHA"
            mapfile -t current_assets < <(gh release view "$TAG" --json assets --jq '.assets[].name')
            for current_asset in "${current_assets[@]}"; do
              keep=false
              for asset in "${release_assets[@]}"; do
                if [ "$(basename "$asset")" = "$current_asset" ]; then
                  keep=true
                  break
                fi
              done
              if [ "$keep" != "true" ]; then
                gh release delete-asset "$TAG" "$current_asset" --yes
              fi
            done
            gh release upload "$TAG" "${release_assets[@]}" --clobber
          else
            # --generate-notes prepends a human-readable changelog (merged PRs /
            # commits since the previous cli-v* tag) so each release has real
            # release notes; --notes keeps the supply-chain evidence footer below
            # it. fetch-depth: 0 (above) gives gh the tag history it needs.
            gh release create "$TAG" "${release_assets[@]}" \
              --draft \
              --target "$GITHUB_SHA" \
              --title "agent-paste CLI $TAG" \
              --generate-notes \
              --notes "Standalone CLI binaries cross-compiled with \`bun build --compile\`. macOS binary is codesigned + notarized. Each binary carries a GitHub build-provenance attestation (verify: \`gh attestation verify <binary> --repo $REPO\`) and an attached SLSA provenance sidecar (\`*.intoto.jsonl\`). A CycloneDX SBOM of exactly what is compiled into the binary (\`agent-paste-cli.sbom.cdx.json\`), a blocking grype scan report (\`agent-paste-cli.grype.json\`), scanner/DB versions (\`scan-metadata.json\`), and repo security attestation bundle (\`repo-security-attestation.tgz\`) are attached. Draft - review and publish manually. Verify downloads against \`SHA256SUMS\`."
          fi
