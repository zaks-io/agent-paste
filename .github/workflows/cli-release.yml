name: CLI Release

# Manually cross/native-compiles the @zaks-io/agent-paste CLI into standalone
# single-file binaries (one per platform, no Node/node_modules required) with
# `bun build --compile`, signs+notarizes the macOS binary with Apple's standard
# tooling (codesign + notarytool), and attaches everything to a single DRAFT
# GitHub Release for human review before publishing.
#
# Native per-OS Blacksmith runners so each binary is built and smoke-checked on
# its real target OS. See AP-36 / AP-41.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/attach the draft to (e.g. cli-v0.1.0)."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: cli-release-${{ github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    # Job-level permissions REPLACE (not merge with) the top-level contents:read,
    # so re-declare it alongside the attestation scopes. id-token mints the
    # Sigstore OIDC token; attestations persists the provenance.
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: blacksmith-2vcpu-ubuntu-2404
            target: bun-linux-x64
            asset: agent-paste-linux-x64
          - name: linux-arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
            target: bun-linux-arm64
            asset: agent-paste-linux-arm64
          - name: macos-arm64
            runner: blacksmith-6vcpu-macos-latest
            target: bun-darwin-arm64
            asset: agent-paste-darwin-arm64
          - name: windows-x64
            runner: blacksmith-4vcpu-windows-2025
            target: bun-windows-x64
            asset: agent-paste-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      # --conditions=types resolves @agent-paste/* workspace deps to their TS
      # source (mirrors apps/cli/build.mjs), so no pre-compile of workspace pkgs.
      - name: Compile binary
        working-directory: apps/cli
        shell: bash
        env:
          BUN_TARGET: ${{ matrix.target }}
          ASSET: ${{ matrix.asset }}
        run: |
          set -euo pipefail
          bun build src/index.ts \
            --compile \
            --conditions=types \
            --target="$BUN_TARGET" \
            --outfile "$ASSET"
          # bun --compile does not set the exec bit, and upload-artifact does not
          # preserve it through its zip round-trip, so assert it here. Harmless on
          # the Windows .exe (filename carries the executable semantics there).
          chmod +x "$ASSET"

      # Proves the binary is genuinely standalone: copy it OUTSIDE the repo to
      # $RUNNER_TEMP (no node_modules ancestry) and run it there. Running from
      # apps/cli would let any stray runtime dep resolve from node_modules and
      # mask a missing bundle. `whoami` exercises credentials.ts (keychain ->
      # file fallback); with no creds it reports "not signed in" and exits 0 (a
      # status query, not an authed action — no API key required).
      - name: Smoke-check binary
        if: runner.os != 'Windows'
        shell: bash
        env:
          ASSET: ${{ matrix.asset }}
        run: |
          set -euo pipefail
          cp "apps/cli/$ASSET" "$RUNNER_TEMP/$ASSET"
          chmod +x "$RUNNER_TEMP/$ASSET"
          cd "$RUNNER_TEMP"
          "./$ASSET" --help
          "./$ASSET" whoami

      - name: Smoke-check binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ASSET: ${{ matrix.asset }}
        run: |
          Copy-Item "apps/cli/$env:ASSET" "$env:RUNNER_TEMP/$env:ASSET"
          Set-Location "$env:RUNNER_TEMP"
          & ".\$env:ASSET" --help
          & ".\$env:ASSET" whoami

      - name: Import Apple Developer certificate
        if: matrix.name == 'macos-arm64'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          : "${APPLE_CERTIFICATE:?APPLE_CERTIFICATE is required}"
          : "${APPLE_CERTIFICATE_PASSWORD:?APPLE_CERTIFICATE_PASSWORD is required}"
          : "${KEYCHAIN_PASSWORD:?KEYCHAIN_PASSWORD is required}"
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm certificate.p12

      - name: Write Apple notarization key
        if: matrix.name == 'macos-arm64'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          : "${APPLE_API_KEY_BASE64:?APPLE_API_KEY_BASE64 is required}"
          key_path="$RUNNER_TEMP/apple-api-key.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      # Hardened-runtime sign, then notarize the standalone executable. A bare
      # CLI binary cannot be stapled (no bundle/installer); notarytool acceptance
      # is the proof, and Gatekeeper verifies online at first run. We zip for
      # submission because notarytool requires a zip/pkg/dmg container.
      - name: Codesign + notarize binary
        if: matrix.name == 'macos-arm64'
        working-directory: apps/cli
        env:
          ASSET: ${{ matrix.asset }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          : "${APPLE_SIGNING_IDENTITY:?APPLE_SIGNING_IDENTITY is required}"
          : "${APPLE_API_ISSUER:?APPLE_API_ISSUER is required}"
          : "${APPLE_API_KEY:?APPLE_API_KEY is required}"
          : "${APPLE_API_KEY_PATH:?APPLE_API_KEY_PATH not set by prior step}"

          codesign --force --timestamp --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" "$ASSET"
          codesign --verify --strict --verbose=2 "$ASSET"

          ditto -c -k --keepParent "$ASSET" "$ASSET.zip"
          xcrun notarytool submit "$ASSET.zip" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          rm -f "$ASSET.zip"

      # Bind each shipped binary to this commit SHA + workflow run + builder
      # identity (SLSA build provenance). Placed AFTER codesign/notarize so the
      # attested digest matches the final macOS bytes; on the other three legs
      # nothing mutates the binary between compile and here (smoke-check runs on
      # a $RUNNER_TEMP copy), so the digest is equally final. Runs on all legs.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: apps/cli/${{ matrix.asset }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: apps/cli/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Draft release
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download all binaries
        uses: actions/download-artifact@v7
        with:
          path: dist-binaries
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist-binaries
        run: sha256sum agent-paste-* > SHA256SUMS

      # One SBOM over the CLI's source closure (the deps baked into the binary
      # via --conditions=types). Scoped to apps/cli — NOT the whole monorepo —
      # so it reflects what ships, not the dev surface. The closure is
      # platform-independent, so one SBOM covers every target. No pnpm install
      # needed: syft reads pnpm-lock.yaml statically.
      - name: Generate SBOM (Syft, SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: apps/cli
          format: spdx-json
          output-file: dist-binaries/agent-paste-cli.sbom.spdx.json
          upload-artifact: false

      # Advisory grype scan of the SBOM (NON-BLOCKING — Phase 1 captures, Phase 2
      # gates). fail-build:false keeps the release green on findings.
      - name: Scan SBOM (advisory)
        id: grype
        uses: anchore/scan-action@v7
        with:
          sbom: dist-binaries/agent-paste-cli.sbom.spdx.json
          severity-cutoff: high
          fail-build: false
          output-format: json

      # Persist the grype report + a small metadata summary so build-time and the
      # Phase-3 daily re-scan are comparable (scanner + vuln-DB versions). The
      # grype JSON embeds descriptor.version + descriptor.db.{built,schemaVersion}.
      - name: Capture scan report and scanner/DB versions
        shell: bash
        env:
          GRYPE_JSON: ${{ steps.grype.outputs.json }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          cp "$GRYPE_JSON" dist-binaries/agent-paste-cli.grype.json
          jq -n \
            --arg grypeVersion "$(jq -r '.descriptor.version // empty' "$GRYPE_JSON")" \
            --arg vulnDbBuilt "$(jq -r '.descriptor.db.built // empty' "$GRYPE_JSON")" \
            --arg vulnDbSchemaVersion "$(jq -r '.descriptor.db.schemaVersion // empty' "$GRYPE_JSON")" \
            --arg commit "$COMMIT_SHA" \
            --arg scannedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{grypeVersion:$grypeVersion, vulnDbBuilt:$vulnDbBuilt, vulnDbSchemaVersion:$vulnDbSchemaVersion, commit:$commit, scannedAt:$scannedAt, blocking:false}' \
            > dist-binaries/scan-metadata.json
          cat dist-binaries/scan-metadata.json

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$TAG" | grep -Eq '^[0-9A-Za-z._/-]+$'; then
            echo "::error::Invalid release tag: $TAG"
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist-binaries/* --clobber
          else
            gh release create "$TAG" dist-binaries/* \
              --draft \
              --title "agent-paste CLI $TAG" \
              --notes "Standalone CLI binaries cross-compiled with \`bun build --compile\`. macOS binary is codesigned + notarized. Each binary carries a GitHub build-provenance attestation (verify: \`gh attestation verify <binary> --repo $REPO\`). An SBOM (\`agent-paste-cli.sbom.spdx.json\`), a grype scan report (\`agent-paste-cli.grype.json\`), and scanner/DB versions (\`scan-metadata.json\`) are attached. Draft — review and publish manually. Verify downloads against \`SHA256SUMS\`."
          fi
