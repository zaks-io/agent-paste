# OpenSSF Scorecard: scores the repo's supply-chain posture (branch
# protection, token permissions, action pinning, signed releases, etc.) and
# publishes to the public OpenSSF API so the README badge resolves.
#
# Runs on the default branch only — the Branch-Protection and Maintained
# checks are meaningless on a feature branch. Not wired into `Validate`: a PR
# can't change repo posture, so per-PR runs add merge-gate latency for no
# signal. See https://github.com/ossf/scorecard/blob/main/docs/checks.md
name: Scorecard supply-chain security

on:
  # Re-score whenever branch protection changes (Branch-Protection check).
  branch_protection_rule:
  # Weekly, to keep the Maintained check fresh and the badge current.
  schedule:
    - cron: "27 7 * * 1"
  push:
    branches: ["main"]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    # publish_results only works from the default branch.
    if: github.event.repository.default_branch == github.ref_name
    permissions:
      # Upload results to the code-scanning dashboard.
      security-events: write
      # Publish results to the OpenSSF API (enables the badge).
      id-token: write
      # Read workflow run data for the Dangerous-Workflow / Token-Permissions checks.
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186 # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          # Fine-grained read-only PAT — without it the Branch-Protection check
          # can't read protection settings and silently scores 0. See README.
          repo_token: ${{ secrets.SCORECARD_TOKEN }}
          # Publish to the OpenSSF REST API so the public badge resolves.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496 # v2.25.6
        with:
          sarif_file: results.sarif
