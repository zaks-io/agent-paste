# Renamed from cleanup-pr-preview.yml and reset to a valid permissions
# block. The previous file declared "administration: write" under
# permissions, which is not a valid GITHUB_TOKEN scope; GitHub rejected
# the workflow at evaluation time. Every push registered a startup_failure
# and every pull_request.closed event (PRs #2--#9) was silently dropped,
# leaving 8 stale preview/pr-N Neon branches. Renaming the file also
# forces GitHub to register a fresh workflow record so the old wedged
# entry stops swallowing events.
name: PR Preview Cleanup

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to clean up
        required: false
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-cleanup-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

env:
  CI: "true"
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  cleanup:
    name: Cleanup PR Preview
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    if: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || (github.event_name == 'workflow_dispatch' && inputs.pr_number != '') }}
    environment: Preview

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Resolve PR number
        id: pr
        env:
          RESOLVED_PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          if ! [[ "$RESOLVED_PR_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::Resolved PR number is not a positive integer: '$RESOLVED_PR_NUMBER'"
            exit 1
          fi
          echo "number=$RESOLVED_PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Delete Cloudflare PR resources
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: node scripts/cleanup-pr-preview.mjs

      - name: Delete Neon PR branch
        if: ${{ always() && steps.pr.outputs.number != '' }}
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: node scripts/delete-neon-pr-branch.mjs

      - name: Delete legacy GitHub PR environment
        if: ${{ always() && steps.pr.outputs.number != '' }}
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.PR_PREVIEW_ENVIRONMENT_CLEANUP_TOKEN }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "Skipping legacy pr-preview-$PR_NUMBER GitHub Environment deletion; set PR_PREVIEW_ENVIRONMENT_CLEANUP_TOKEN with repository Administration write permission to enable it."
            exit 0
          fi
          node scripts/delete-github-pr-preview-environment.mjs

      - name: Comment cleanup status
        if: ${{ github.event_name == 'pull_request' && success() }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "agent-paste PR preview resources were cleaned up. The shared Preview GitHub Environment is retained for future preview deploys.",
            });

      - name: Comment cleanup failure
        if: ${{ github.event_name == 'pull_request' && failure() && steps.pr.outputs.number != '' }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `agent-paste PR preview cleanup did not complete. Inspect ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId} and rerun PR Preview Cleanup for PR #${{ steps.pr.outputs.number }}.`,
            });

  reconcile-stale:
    name: Reconcile Stale PR Previews
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.pr_number == '') }}
    environment: Preview

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Reconcile stale PR previews
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: node scripts/cleanup-stale-pr-previews.mjs
