name: Deploy Production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  CI: "true"
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  deploy:
    name: Deploy Production
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 45
    environment: Production
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.head_repository.full_name == github.repository) }}

    steps:
      - name: Validate deploy source
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HEAD_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "workflow_run" ]; then
            exit 0
          fi
          test "$WORKFLOW_RUN_CONCLUSION" = "success"
          test "$WORKFLOW_RUN_HEAD_BRANCH" = "main"
          test "$WORKFLOW_RUN_HEAD_REPOSITORY" = "$GITHUB_REPOSITORY"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/heads/main

      - name: Verify checked out CI commit
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "workflow_run" ]; then
            exit 0
          fi
          checked_out_sha="$(git rev-parse HEAD)"
          if [ "$checked_out_sha" != "$WORKFLOW_RUN_HEAD_SHA" ]; then
            echo "::error::main moved after CI completed; refusing to deploy $checked_out_sha instead of $WORKFLOW_RUN_HEAD_SHA"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Setup security attestation tools
        uses: ./.github/actions/setup-security-attestation-tools

      - name: Run release security attestation
        run: pnpm security:attest

      - name: Upload release security attestation
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-release-security-attestation
          path: artifacts/security/**
          if-no-files-found: error
          retention-days: 90

      - name: Validate manual dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
          TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
        run: pnpm verify

      - name: Build production artifacts
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
          TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
        run: pnpm build

      - name: Migrate production database
        env:
          DATABASE_URL_MIGRATIONS_PRODUCTION: ${{ secrets.DATABASE_URL_MIGRATIONS_PRODUCTION }}
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          # scripts/migrate.mjs runs the Hyperdrive branch guard, which shells out to
          # `wrangler hyperdrive get`. Wrangler needs CLOUDFLARE_API_TOKEN in a
          # non-interactive env or it exits 1 before any migration runs.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm migrate:production

      - name: Deploy production Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          # Per ADR 0078: the Production GitHub environment is the single source of
          # truth for secret VALUES. scripts/deploy.mjs injects these onto each
          # Worker (wrangler secret bulk over stdin) so the Worker cannot drift from
          # source. A required secret with no value here fails the deploy fast.
          # Routing/required-set source of truth: scripts/lib/secret-routing.mjs.
          PRODUCTION_CONTENT_SIGNING_SECRET: ${{ secrets.PRODUCTION_CONTENT_SIGNING_SECRET }}
          PRODUCTION_UPLOAD_SIGNING_SECRET: ${{ secrets.PRODUCTION_UPLOAD_SIGNING_SECRET }}
          PRODUCTION_ARTIFACT_BYTES_ENCRYPTION_KEY: ${{ secrets.PRODUCTION_ARTIFACT_BYTES_ENCRYPTION_KEY }}
          PRODUCTION_API_KEY_PEPPER_V1: ${{ secrets.PRODUCTION_API_KEY_PEPPER_V1 }}
          PRODUCTION_API_KEY_PEPPER_V2: ${{ secrets.PRODUCTION_API_KEY_PEPPER_V2 }}
          PRODUCTION_EPHEMERAL_POW_SECRET: ${{ secrets.PRODUCTION_EPHEMERAL_POW_SECRET }}
          PRODUCTION_STREAM_INTERNAL_SECRET: ${{ secrets.PRODUCTION_STREAM_INTERNAL_SECRET }}
          PRODUCTION_CF_ACCESS_AUD: ${{ secrets.PRODUCTION_CF_ACCESS_AUD }}
          PRODUCTION_WORKOS_API_KEY: ${{ secrets.PRODUCTION_WORKOS_API_KEY }}
          PRODUCTION_WORKOS_COOKIE_PASSWORD: ${{ secrets.PRODUCTION_WORKOS_COOKIE_PASSWORD }}
          # Stripe billing (ADR 0073/0074). Optional per scripts/lib/secret-routing.mjs:
          # the deploy succeeds without them and the routes stay gated by BILLING_ENABLED
          # (off in production until paid plans launch). Injected onto the api Worker so
          # production carries the same Stripe secret surface as preview.
          PRODUCTION_STRIPE_SECRET_KEY: ${{ secrets.PRODUCTION_STRIPE_SECRET_KEY }}
          PRODUCTION_STRIPE_WEBHOOK_SIGNING_SECRET: ${{ secrets.PRODUCTION_STRIPE_WEBHOOK_SIGNING_SECRET }}
          PRODUCTION_STRIPE_PRICE_ID_MONTHLY: ${{ secrets.PRODUCTION_STRIPE_PRICE_ID_MONTHLY }}
          PRODUCTION_STRIPE_PRICE_ID_ANNUAL: ${{ secrets.PRODUCTION_STRIPE_PRICE_ID_ANNUAL }}
        run: node scripts/deploy.mjs production

      - name: Smoke production (read-only, no credentials)
        run: pnpm smoke:prod:readonly
