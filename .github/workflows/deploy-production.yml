name: Deploy Production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  CI: "true"
  TURBO_TELEMETRY_DISABLED: "1"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    name: Deploy Production
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 25
    environment: Production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Validate manual dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: pnpm verify

      - name: Build production artifacts
        run: pnpm build

      - name: Migrate production database
        env:
          DATABASE_URL_MIGRATIONS_PRODUCTION: ${{ secrets.DATABASE_URL_MIGRATIONS_PRODUCTION }}
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: pnpm migrate:production

      - name: Deploy production Workers
        run: node scripts/deploy-preview.mjs production

      - name: Smoke production
        env:
          AGENT_PASTE_PRODUCTION_SMOKE_API_KEY: ${{ secrets.AGENT_PASTE_PRODUCTION_SMOKE_API_KEY }}
        run: pnpm smoke:production
