name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  TURBO_TELEMETRY_DISABLED: "1"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

jobs:
  changes:
    name: Detect changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      # `code` is "true" unless EVERY changed file is docs-only. Computed by an
      # explicit git diff rather than a path-matcher action so the docs-only
      # rule is unambiguous and auditable.
      code: ${{ steps.diff.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine whether non-docs files changed
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_SHA:-}" ]; then
            # Not a PR (push to main / manual dispatch): always run code checks.
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # List files changed since the PR base. A file is docs-only when it
          # matches one of these globs; keep in sync with pr-preview.yml and
          # security.yml.
          code=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/*|.claude/*|*.md) ;;
              *) code=true; break ;;
            esac
          done < <(git diff --name-only "${BASE_SHA}...HEAD")
          echo "code=$code" >> "$GITHUB_OUTPUT"

  secrets:
    name: Secret scan
    # Fast, incremental PR-range scan for quick feedback. The full-history scan
    # (plus a daily cron) lives in the dedicated Security workflow (ADR 0076).
    needs: changes
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.code == 'true' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan PR commit range for secrets
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gitleaks git --no-banner --redact --config .gitleaks.toml --exit-code 1 \
            --log-opts="${BASE_SHA}..${HEAD_SHA}"

  validate:
    name: Validate
    # Always runs so the required check always reports. On docs-only PRs the
    # `code` filter is false and every heavy step below is skipped, so the job
    # is a fast green no-op; on push to main it runs in full.
    needs: changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    env:
      RUN_CODE: ${{ needs.changes.outputs.code == 'true' || github.event_name != 'pull_request' }}

    steps:
      - name: Docs-only short-circuit
        if: ${{ env.RUN_CODE != 'true' }}
        run: echo "Docs-only change; skipping build/verify/coverage."

      - name: Checkout
        if: ${{ env.RUN_CODE == 'true' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        if: ${{ env.RUN_CODE == 'true' }}
        uses: pnpm/action-setup@v6

      - name: Setup Node
        if: ${{ env.RUN_CODE == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: ${{ env.RUN_CODE == 'true' }}
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Restore Turbo local cache
        if: ${{ env.RUN_CODE == 'true' }}
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Verify dependency guardrails
        if: ${{ env.RUN_CODE == 'true' }}
        run: |
          test "$(tr -d '[:space:]' < .nvmrc)" = "$(tr -d '[:space:]' < .node-version)"
          test "$(pnpm config get engine-strict)" = "true"
          test "$(pnpm config get minimumReleaseAge)" = "4320"
          test "$(pnpm config get nodeLinker)" = "isolated"

      - name: Verify Turbo cache guardrails
        if: ${{ env.RUN_CODE == 'true' }}
        run: |
          node -e '
            const fs = require("node:fs");
            const config = JSON.parse(fs.readFileSync("turbo.json", "utf8"));
            if (config.envMode !== "strict") throw new Error("turbo.json must use envMode=strict");
            if (config.remoteCache?.signature !== true) throw new Error("turbo.json must enable signed remote cache");
            if (config.futureFlags?.longerSignatureKey !== true) throw new Error("turbo.json must enforce longer remote cache signature keys");
          '

      - name: Verify Turbo remote cache credentials
        if: ${{ env.RUN_CODE == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          missing=0
          for name in TURBO_TOKEN TURBO_TEAM TURBO_REMOTE_CACHE_SIGNATURE_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for signed Turborepo remote caching"
              missing=1
            fi
          done
          exit "$missing"

      - name: Validate
        if: ${{ env.RUN_CODE == 'true' }}
        run: pnpm verify

      # The OpenAPI specs are validated by the release security attestation
      # (`pnpm security:attest`), which otherwise only runs at deploy/release
      # time. Gate the *deterministic* spec check here too so a contract change
      # that trips checkov can never merge green and then break the production
      # deploy (which happened once: a checkov-openapi failure skipped the deploy
      # and froze prod). The advisory CVE scanners (trivy/grype/semgrep) stay out
      # of PR CI so a fresh upstream advisory can't block unrelated PRs. checkov
      # auto-discovers the repo-root .checkov.yaml; keep the pin in sync with
      # .github/actions/setup-security-attestation-tools.
      - name: Setup Python
        if: ${{ env.RUN_CODE == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Attest OpenAPI specs (checkov)
        if: ${{ env.RUN_CODE == 'true' }}
        run: |
          python3 -m pip install --quiet "checkov==3.2.510"
          checkov -d packages/contracts/openapi --framework openapi --quiet --compact

      - name: Coverage
        if: ${{ env.RUN_CODE == 'true' }}
        run: pnpm test:coverage

      - name: Upload coverage artifact
        if: ${{ always() && env.RUN_CODE == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage/coverage-final.json
            coverage/lcov.info
          if-no-files-found: error
          retention-days: 14
