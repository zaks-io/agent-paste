pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css,yml,yaml}"
      stage_fixed: true
      run: pnpm exec biome check --write --staged --no-errors-on-unmatched {staged_files}
    prettier-docs:
      glob: "{*.md,**/*.md}"
      stage_fixed: true
      run: pnpm exec prettier --write {staged_files}
    gitleaks:
      run: gitleaks protect --staged --redact
    typecheck:
      run: |
        BASE="$(git rev-parse --verify origin/main 2>/dev/null || git rev-parse --verify HEAD)"
        pnpm exec turbo run typecheck --filter="...[$BASE]"

pre-push:
  commands:
    # Mirror the CI Validate job (.github/workflows/ci.yml): run the full gate
    # locally so lint/repo-lint/openapi/db:check failures surface before push,
    # not in CI. `pnpm verify` covers lint, typecheck, test, knip, openapi:check,
    # db:check, and docs formatting; test:coverage matches CI's separate step.
    #
    # TURBO_FORCE bypasses local and remote turbo cache so pre-push matches CI
    # Validate (cold install + no stale hits). Without it, turbo can serve cached
    # lint/test/build passes after deletions — e.g. AP-129 (noUnusedImports) and
    # AP-128 (global branch coverage dropped to 79.99% while build/test cache
    # still reported green). verify's turbo tasks and test:coverage's build step
    # both need a fresh run; vitest coverage thresholds are global across packages
    # and cannot be reasoned about by per-package turbo cache keys alone.
    verify:
      run: pnpm verify
      env:
        TURBO_FORCE: "true"
    test-coverage:
      run: pnpm test:coverage
      env:
        TURBO_FORCE: "true"
