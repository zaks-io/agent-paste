pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css,yml,yaml}"
      stage_fixed: true
      run: pnpm exec biome check --write --staged --no-errors-on-unmatched {staged_files}
    prettier-docs:
      glob: "{*.md,**/*.md}"
      stage_fixed: true
      run: pnpm exec prettier --write {staged_files}
    gitleaks:
      run: gitleaks protect --staged --redact
    typecheck:
      run: |
        BASE="$(git rev-parse --verify origin/main 2>/dev/null || git rev-parse --verify HEAD)"
        pnpm exec turbo run typecheck --filter="...[$BASE]"

pre-push:
  commands:
    # Mirror the CI Validate job (.github/workflows/ci.yml): run the full gate
    # locally so lint/repo-lint/openapi/db:check failures surface before push,
    # not in CI. `pnpm verify` covers lint, typecheck, test, knip, openapi:check,
    # db:check, and docs formatting; test:coverage matches CI's separate step.
    verify:
      run: pnpm verify
    test-coverage:
      # Coverage is a global/aggregate gate (80% across the whole repo); turbo's
      # per-package cache cannot see that a deletion elsewhere moved the global
      # number, so a cached build/test pass can lie (AP-128). Force a cold turbo
      # build before vitest. Per-package checks in `verify` cache safely and stay
      # fast — do not add TURBO_FORCE there (AP-136).
      run: pnpm test:coverage
      env:
        TURBO_FORCE: "true"
