pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css,yml,yaml}"
      stage_fixed: true
      run: pnpm exec biome check --write --staged --no-errors-on-unmatched {staged_files}
    prettier-docs:
      glob: "{*.md,**/*.md}"
      stage_fixed: true
      run: pnpm exec prettier --write {staged_files}
    gitleaks:
      run: gitleaks protect --staged --redact
    typecheck:
      run: |
        BASE="$(git rev-parse --verify origin/main 2>/dev/null || git rev-parse --verify HEAD)"
        pnpm exec turbo run typecheck --filter="...[$BASE]"

pre-push:
  commands:
    verify:
      run: pnpm verify
    test-coverage:
      # Coverage is a GLOBAL/aggregate gate (80% across the whole repo); turbo's
      # per-package cache can't see that a deletion elsewhere moved the global
      # number, so a cached green lies. Force a cold turbo build before vitest.
      # Per-package checks in `verify` cache safely and stay fast. See AP-136 —
      # this false-green bounced three AP-126 slices. (pnpm `--force` reaches
      # vitest, which has no such flag; TURBO_FORCE is the cache bypass here.)
      run: pnpm test:coverage
      env:
        TURBO_FORCE: "true"
