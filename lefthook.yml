pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css,yml,yaml}"
      stage_fixed: true
      run: pnpm exec biome check --write --staged --no-errors-on-unmatched {staged_files}
    prettier-docs:
      glob: "{*.md,**/*.md}"
      stage_fixed: true
      run: pnpm exec prettier --write {staged_files}
    gitleaks:
      run: gitleaks protect --staged --redact
    typecheck:
      run: |
        BASE="$(git rev-parse --verify origin/main 2>/dev/null || git rev-parse --verify HEAD)"
        pnpm exec turbo run typecheck --filter="...[$BASE]"

pre-push:
  commands:
    verify:
      # Cached — per-package checks are safe to cache, keep push fast.
      run: pnpm verify
    test-coverage:
      # Force the per-workspace coverage run (`--force`) so a stale turbo cache
      # cannot serve a false green: the root merge then enforces the repo-wide
      # threshold on freshly recomputed artifacts, matching CI exactly. A cached
      # `test:coverage` previously let a coverage-tipping diff push red (AP-136).
      run: pnpm test:coverage:strict
