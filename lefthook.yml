pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css,yml,yaml}"
      stage_fixed: true
      run: pnpm exec biome check --write --staged --no-errors-on-unmatched {staged_files}
    prettier-docs:
      glob: "{*.md,**/*.md}"
      stage_fixed: true
      run: pnpm exec prettier --write {staged_files}
    gitleaks:
      run: gitleaks protect --staged --redact
    typecheck:
      run: |
        BASE="$(git rev-parse --verify origin/main 2>/dev/null || git rev-parse --verify HEAD)"
        pnpm exec turbo run typecheck --filter="...[$BASE]"

pre-push:
  commands:
    # Mirror CI Validate (.github/workflows/ci.yml) with a cold run — no turbo
    # cache. Cached pre-push passes bounced three AP-126 slices (AP-128 coverage
    # at 79.99%, AP-129 lint noUnusedImports) because turbo replayed stale greens
    # that CI's fresh install would catch. The hook is the gate; it must not trust
    # the cache. Day-to-day `pnpm verify` / `pnpm test:coverage` stay cacheable.
    verify:
      run: pnpm verify --force
    test-coverage:
      # pnpm forwards `--force` to vitest, not turbo build; TURBO_FORCE cold-runs
      # the build step inside test:coverage (same bypass as --force on turbo).
      run: pnpm test:coverage
      env:
        TURBO_FORCE: "true"
