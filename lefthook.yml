pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css,yml,yaml}"
      stage_fixed: true
      run: pnpm exec biome check --write --staged --no-errors-on-unmatched {staged_files}
    prettier-docs:
      glob: "{*.md,**/*.md}"
      stage_fixed: true
      run: pnpm exec prettier --write {staged_files}
    gitleaks:
      run: gitleaks protect --staged --redact
    typecheck:
      run: |
        BASE="$(git rev-parse --verify origin/main 2>/dev/null || git rev-parse --verify HEAD)"
        pnpm exec turbo run typecheck --filter="...[$BASE]"

pre-push:
  commands:
    verify:
      # Cached — per-package checks are safe to cache, keep push fast.
      run: pnpm verify
    test-coverage:
      # Coverage is a GLOBAL/aggregate gate (80% across the whole repo); turbo's
      # per-package cache can't see that a deletion elsewhere moved the global
      # number, so a cached green lies (bounced AP-128/AP-129). Force a cold run.
      # (pnpm `--force` reaches vitest, which has no such flag; TURBO_FORCE bypasses
      # the turbo build step inside test:coverage.)
      run: pnpm test:coverage
      env:
        TURBO_FORCE: "true"
