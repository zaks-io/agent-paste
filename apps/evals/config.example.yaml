version: 1

suite:
  id: homepage-cold
  description: User copies the apex homepage prompt into a coding agent.
  prompt:
    source: static
    text: >
      Can you look over https://preview.agent-paste.sh/agents.md, then make a simple
      HTML page showing a few concrete ways Agent Paste saves time? Publish it
      with Agent Paste and send me the link.
    claim_code:
      mode: generate
      prompt_suffix: >
        This eval runs against the configured preview Agent Paste environment.
        The sandbox is intentionally empty: no user repository, git checkout,
        package.json, or app source is mounted in /workspace. Do not inspect
        /workspace or look for local project context unless source files are
        explicitly provided. Use the AGENT_PASTE_* environment variables that are
        already set. Do not publish to production. If login is unavailable or
        non-interactive, publish with --ephemeral. Include this attribution flag
        only on the publish command, not inside the public artifact: --claim-code
        {claim_code}.

environment:
  target: preview
  reject_production_urls: true
  env:
    AGENT_PASTE_API_URL: https://api.preview.agent-paste.sh
    AGENT_PASTE_UPLOAD_URL: https://upload.preview.agent-paste.sh
    AGENT_PASTE_WEB_URL: https://app.preview.agent-paste.sh

sandbox:
  provider: docker
  image: agent-paste-evals-agent-runner:0.2.0
  docker:
    build: missing
    dockerfile: apps/evals/docker/agent-runner.Dockerfile
    context: apps/evals/docker
    network: bridge
    workdir: /workspace
    extra_run_args: []
  max_concurrent_creates: 5
  max_concurrent_running: 5
  resources:
    cpu: 2
    memory_gb: 4
    disk_gb: 20
  lifecycle:
    auto_stop_interval_minutes: 30
    auto_delete_interval_minutes: 180
  network:
    allow_domains: []
    allow_cidrs: []
    probe_urls:
      - https://preview.agent-paste.sh/agents.md
      - https://api.preview.agent-paste.sh/openapi.json
      - https://upload.preview.agent-paste.sh/openapi.json
      - https://app.preview.agent-paste.sh/robots.txt
      - https://registry.npmjs.org/-/ping
      - https://registry.npmjs.org/@zaks-io%2Fagent-paste
      - https://openrouter.ai/api/v1/models
      - https://openrouter.ai/api/v1/endpoints/zdr
    block_all: false
  fresh_paths:
    HOME: /tmp/agent-home
    XDG_CONFIG_HOME: /tmp/agent-xdg
    NPM_CONFIG_CACHE: /tmp/agent-npm-cache
    PI_CODING_AGENT_DIR: /tmp/pi-agent
    PI_CODING_AGENT_SESSION_DIR: /tmp/pi-sessions
    CODEX_HOME: /workspace/.codex-home
    CLAUDE_CONFIG_DIR: /tmp/claude-config
  forbidden_cached_packages:
    - "@zaks-io/agent-paste"

matrix:
  repeats_per_model: 1
  concurrency: 5
  openrouter:
    max_concurrent_requests: 5
    requests_per_minute: null
    tokens_per_minute: null
  harnesses:
    - id: pi-rpc
      adapter: pi
      command: pi
      mode: rpc
      version: latest
      profile: homepage-cold-basic
      capabilities:
        shell: true
        filesystem: true
        network: true
        web_search: false
      config:
        tools:
          - read
          - write
          - edit
          - bash
          - grep
          - find
          - ls
        no_session: false
        no_extensions: true
        append_system_prompt: >
          This eval sandbox is an empty scratch workspace, not the user's app
          repository. Do not inspect /workspace, search for a git checkout, or
          look for package.json unless the prompt explicitly provides local
          source files. Use public docs and the configured Agent Paste
          environment, then create and publish the requested artifact.

    - id: claude-code
      enabled: false
      adapter: claude-code
      command: claude
      mode: stream-json
      version: latest
      profile: homepage-cold-claude
      capabilities:
        shell: true
        filesystem: true
        network: true
        web_search: true
      config:
        permission_mode: bypassPermissions
        allowed_tools:
          - Bash
          - Read
          - Write
          - Edit
          - MultiEdit
          - Glob
          - Grep
        append_system_prompt: >
          This eval sandbox is an empty scratch workspace, not the user's app
          repository. Do not inspect /workspace, search for a git checkout, or
          look for package.json unless the prompt explicitly provides local
          source files. Use public docs and the configured Agent Paste
          environment, then create and publish the requested artifact.

    - id: codex
      enabled: false
      adapter: codex
      command: codex
      mode: jsonl
      version: latest
      profile: homepage-cold-codex
      capabilities:
        shell: true
        filesystem: true
        network: true
        web_search: true
      config:
        bypass_sandbox: true
        ephemeral: true
        search: true
        config_overrides:
          model_provider: openai_http
          model_providers.openai_http.name: OpenAI HTTPS
          model_providers.openai_http.base_url: https://api.openai.com/v1
          model_providers.openai_http.env_key: OPENAI_API_KEY
          model_providers.openai_http.wire_api: responses
          model_providers.openai_http.supports_websockets: false
        append_system_prompt: >
          This eval sandbox is an empty scratch workspace, not the user's app
          repository. Do not inspect /workspace, search for a git checkout, or
          look for package.json unless the prompt explicitly provides local
          source files. Use public docs and the configured Agent Paste
          environment, then create and publish the requested artifact.

  models:
    - id: anthropic/claude-opus-4.8
      provider: openrouter
      effort_label: medium
      supported_harnesses:
        - pi-rpc
        - claude-code
      harness_model_ids:
        claude-code: opus
      provider_params:
        reasoning:
          exclude: true
        provider:
          zdr: true
          data_collection: deny
        verbosity: medium

    - id: anthropic/claude-sonnet-4.6
      provider: openrouter
      effort_label: medium
      supported_harnesses:
        - pi-rpc
        - claude-code
      harness_model_ids:
        claude-code: sonnet
      provider_params:
        reasoning:
          exclude: true
        verbosity: medium

    - id: openai/gpt-5.5
      provider: openrouter
      effort_label: medium
      supported_harnesses:
        - pi-rpc
        - codex
      harness_model_ids:
        codex: gpt-5.5
      provider_params:
        reasoning:
          effort: medium
          exclude: true

    - id: openai/gpt-5.5
      label: openai/gpt-5.5-low
      provider: openrouter
      effort_label: low
      pi:
        thinking: low
      supported_harnesses:
        - pi-rpc
        - codex
      harness_model_ids:
        codex: gpt-5.5
      provider_params:
        reasoning:
          effort: low
          exclude: true
        provider:
          zdr: true
          data_collection: deny

    - id: openai/gpt-5.5
      label: openai/gpt-5.5-xhigh
      provider: openrouter
      effort_label: xhigh
      pi:
        thinking: xhigh
      supported_harnesses:
        - pi-rpc
        - codex
      harness_model_ids:
        codex: gpt-5.5
      provider_params:
        reasoning:
          effort: xhigh
          exclude: true
        provider:
          zdr: true
          data_collection: deny

    - id: z-ai/glm-5.2
      provider: openrouter
      effort_label: medium
      supported_harnesses:
        - pi-rpc
      provider_params:
        reasoning:
          effort: medium
          exclude: true

    - id: moonshotai/kimi-k2.7-code
      provider: openrouter
      effort_label: medium
      supported_harnesses:
        - pi-rpc
      provider_params:
        reasoning:
          effort: medium
          exclude: true
        provider:
          zdr: true
          data_collection: deny

    - id: qwen/qwen3.7-max
      provider: openrouter
      enabled: false
      effort_label: medium
      supported_harnesses:
        - pi-rpc
      provider_params:
        reasoning:
          effort: medium
          exclude: true
        provider:
          zdr: true
          data_collection: deny

    - id: minimax/minimax-m3
      provider: openrouter
      effort_label: medium
      supported_harnesses:
        - pi-rpc
      provider_params:
        reasoning:
          effort: medium
          exclude: true
        provider:
          zdr: true
          data_collection: deny

    - id: deepseek/deepseek-v4-pro
      provider: openrouter
      effort_label: medium
      supported_harnesses:
        - pi-rpc
      provider_params:
        reasoning:
          effort: medium
          exclude: true
        provider:
          zdr: true
          data_collection: deny

    - id: google/gemini-3.5-flash
      provider: openrouter
      effort_label: medium
      supported_harnesses:
        - pi-rpc
      provider_params:
        reasoning:
          effort: medium
          exclude: true
        provider:
          zdr: true
          data_collection: deny

timeouts:
  agent_timeout_ms: 600000
  command_idle_timeout_ms: 90000
  sandbox_boot_timeout_ms: 180000
  verification_timeout_ms: 60000
  judge_timeout_ms: 120000
  max_turns: 20

retries:
  infra_attempts: 3
  retryable_categories:
    - docker_image_build
    - docker_container_start
    - harness_start
    - openrouter_transient
    - verifier_fetch
    - judge_request

verification:
  require_unlisted_url: true
  require_final_answer_url: true
  require_http_status: 200
  capture_claim_url: true
  redeem_claim_url: false
  fetch_artifact_snapshot: true

judge:
  enabled: true
  provider: openrouter
  model: openai/gpt-5.5
  rubric_version: homepage-cold-v2
  max_transcript_chars: 200000
  oversized_transcript: fail
  structured_output: true
  weights:
    task_success: 35
    onboarding_correctness: 20
    efficiency: 20
    doc_friction_signal: 15
    artifact_value: 10

reporting:
  output_dir: eval-results
  env_file: .env.local
  write_jsonl_events: true
  write_html_transcript: true
  write_artifact_snapshot: true
  write_aggregate_markdown: true

cleanup:
  mode: expire_only
