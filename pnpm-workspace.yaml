packages:
  - apps/*
  - packages/*

catalog:
  '@biomejs/biome': ^2.4.15
  '@stryker-mutator/core': ^9.6.1
  '@stryker-mutator/typescript-checker': ^9.6.1
  '@stryker-mutator/vitest-runner': ^9.6.1
  '@vitest/coverage-v8': ^4.1.7
  turbo: ^2.9.14
  typescript: ^6.0.3
  vitest: ^4.1.7
  zod: ^4.4.3

minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  - '@biomejs/biome'
  - '@cloudflare/workers-types'
  - '@stryker-mutator/*'
  - '@vitest/*'
  - hono
  - lefthook
  - turbo
  - typescript
  - vitest
  - wrangler

auditConfig:
  ignoreGhsas:
    # esbuild <0.28.1 advisories (Deno-module-only RCE; Windows-only dev-server
    # file read) — neither code path is reachable in this repo. Remove these and
    # bump esbuild to >=0.28.1 once it clears minimumReleaseAge (~2026-06-15).
    - GHSA-gv7w-rqvm-qjhr
    - GHSA-g7r4-m6w7-qqqr

nodeLinker: isolated

patchedDependencies:
  '@workos/authkit-tanstack-react-start@0.8.3': patches/@workos__authkit-tanstack-react-start@0.8.3.patch

supportedArchitectures:
  cpu: [x64, arm64]
  libc: [glibc, musl]
  os: [linux, darwin, win32]
