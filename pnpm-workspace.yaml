packages:
  - apps/*
  - packages/*

nodeLinker: isolated
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@biomejs/biome'
  - '@vitest/*'
  - lefthook
  - turbo
  - typescript
  - vitest

supportedArchitectures:
  os:
    - linux
    - darwin
    - win32
  cpu:
    - x64
    - arm64
  libc:
    - glibc
    - musl

catalog:
  '@biomejs/biome': ^2.4.15
  turbo: ^2.9.14
  typescript: ^6.0.3
  vitest: ^4.1.7
  zod: ^4.4.3
