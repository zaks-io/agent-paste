# Checkov configuration for the release security attestation (`pnpm security:attest`)
# and the PR-time OpenAPI gate. Scoped narrowly: only suppress checks that are
# deliberate, reviewed design choices — never blanket-disable a check we satisfy.
skip-check:
  # CKV_OPENAPI_5 "Ensure that security operations is not empty."
  # agent-paste intentionally exposes unauthenticated public endpoints — e.g.
  # GET /v1/public/cli-version (operationId cli.version) — which set an empty
  # operation-level `security: []` to opt out of the populated global security
  # requirement. An empty security array on these endpoints is a deliberate,
  # reviewed decision, not a missing control. The global security field IS
  # defined (CKV_OPENAPI_4 passes) and remains enforced.
  - CKV_OPENAPI_5
